name: Update Portfolio Activity Data

on:
  schedule:
    - cron: '0 6,18 * * *' # Runs twice a day (6:00 AM and 6:00 PM UTC)
  workflow_dispatch:      # Allows manual trigger in the GitHub UI

permissions:
  contents: write

jobs:
  update-activity-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests pynacl

      - name: Fetch Chess.com stats
        run: python scripts/sync_chess.py

      - name: Fetch Strava workouts
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python scripts/sync_strava.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/chess.json assets/data/activities.json || echo "No files to add"
          git commit -m "chore: update portfolio activity data [skip ci]" || echo "No changes to commit"
          git push
